id: gay.brie.CheesePaper
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: "org.freedesktop.Sdk"
sdk-extensions:
  - "org.freedesktop.Sdk.Extension.rust-stable"
  - "org.freedesktop.Sdk.Extension.llvm22"
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
command: "cheese-paper"
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=fallback-x11
  # Wayland access
  - --socket=wayland
  # GPU acceleration (for egui (I think?))
  - --device=dri
  # Needs to talk to the network: (only for checking for updates,
  # can (should?) disable for flathub)
  - --share=network
  # cheese-paper uses config and data
  - --filesystem=xdg-config/cheese-paper
  - --filesystem=xdg-data/cheese-paper
modules:
  - name: xdg-utils
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/flatpak/flatpak-xdg-utils
        tag: 1.0.6
        commit: 05abdd7421688be5835a6b12f2b068086c38d4aa
  - name: cheese-paper
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/cheese-paper/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dm755 ./target/release/cheese-paper -t /app/bin
      - install -Dm644 ./build/flatpak/${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 ./build/${FLATPAK_ID}.desktop -t /app/share/applications/
      - install -Dm644 ./resources/cheese-paper-icon.png /app/share/icons/hicolor/128x128/apps/gay.brie.CheesePaper.png
    sources:
      - "cargo-sources.json"
      - type: git
        url: https://codeberg.org/ByteOfBrie/cheese-paper.git
        tag: 0.9.0
        commit: c2874e73938332d376cf92509156046416eafc77
